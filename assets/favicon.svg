<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#070008"/>
  <defs>
    <radialGradient id="fl" cx="38%" cy="44%" r="64%">
      <stop offset="0%" stop-color="#FF9DAB"/><stop offset="100%" stop-color="#C21045"/>
    </radialGradient>
    <radialGradient id="fr" cx="62%" cy="58%" r="56%">
      <stop offset="0%" stop-color="#8B1A40"/><stop offset="100%" stop-color="#200010"/>
    </radialGradient>
    <radialGradient id="ft" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFA0B0"/><stop offset="100%" stop-color="#D02050"/>
    </radialGradient>
    <radialGradient id="fc" cx="32%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#8C1538"/><stop offset="100%" stop-color="#350015"/>
    </radialGradient>
    <clipPath id="fll"><rect x="0" y="0" width="32" height="64"/></clipPath>
    <clipPath id="flr"><rect x="32" y="0" width="32" height="64"/></clipPath>
  </defs>
  <!-- tongue -->
  <ellipse cx="17" cy="50" rx="6" ry="8"  fill="url(#ft)"/>
  <ellipse cx="15" cy="57" rx="3.5" ry="3.5" fill="url(#ft)"/>
  <!-- lips left -->
  <g clip-path="url(#fll)">
    <path d="M6,29 C8,23 13,16 21,18 C26,19 29,22 32,22 C35,22 38,19 43,18 C51,16 56,23 58,29 C55,38 49,45 41,48 C37,49 34,50 32,50 C30,50 27,49 23,48 C15,45 9,38 6,29Z" fill="url(#fl)"/>
  </g>
  <!-- lips right -->
  <g clip-path="url(#flr)">
    <path d="M6,29 C8,23 13,16 21,18 C26,19 29,22 32,22 C35,22 38,19 43,18 C51,16 56,23 58,29 C55,38 49,45 41,48 C37,49 34,50 32,50 C30,50 27,49 23,48 C15,45 9,38 6,29Z" fill="url(#fr)"/>
  </g>
  <!-- mouth gap -->
  <path d="M11,29 C17,31 25,32 32,32 C39,32 47,31 53,29 C48,26 40,25 32,25 C24,25 16,26 11,29Z" fill="#06000A" opacity=".95"/>
  <!-- highlight -->
  <ellipse cx="20" cy="22" rx="8" ry="3" fill="white" opacity=".15" transform="rotate(-10,20,22)"/>
  <!-- cherry -->
  <circle cx="51" cy="13" r="8" fill="url(#fc)"/>
  <ellipse cx="48" cy="10" rx="3" ry="2.2" fill="white" opacity=".28" transform="rotate(-20,48,10)"/>
